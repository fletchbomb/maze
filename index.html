function refreshUnitMaxHp(cls){if(!state)return; for(const u of state.units.filter(u=>!u.dead&&u.cls===cls)){const oldMax=u.maxHp||1, st=statsFor(u.team,u.cls); u.maxHp=st.hp; u.hp=Math.min(st.hp,Math.max(1,u.hp+(st.hp-oldMax)));}}
function onDebugClick(e){const b=e.target.closest('[data-debug-action]'); if(!b||!state)return; if(b.dataset.debugAction==='grantA')state.players.A.up++; if(b.dataset.debugAction==='grantB')state.players.B.up++; if(b.dataset.debugAction==='clearUnits'){state.units=[];markBoardDirty();} if(b.dataset.debugAction==='resetMatch'){state.players.A.score=state.players.B.score=0;state.players.A.scoreMeter=state.players.B.scoreMeter=0;state.time=0;state.ended=false;state.winner=null;spawnTestSite(true);$('#end').style.display='none';} renderAll(); broadcastState(true);}
function setBalanceVar(name,val){
  if(name==='UNIT_MOVE_SPEED_MULT')UNIT_MOVE_SPEED_MULT=clampBalance(val,.05,3,UNIT_MOVE_SPEED_MULT);
  if(name==='UPGRADE_XP_COST')UPGRADE_XP_COST=Math.round(clampBalance(val,1,60,UPGRADE_XP_COST));
  if(name==='CENTER_DAMAGE_RATE')CENTER_DAMAGE_RATE=clampBalance(val,0,8,CENTER_DAMAGE_RATE);
  if(name==='CENTER_SCORE_PER_HP')CENTER_SCORE_PER_HP=clampBalance(val,0,5,CENTER_SCORE_PER_HP);
  if(name==='TEST_SITE_POINTS'){TEST_SITE_POINTS=Math.round(clampBalance(val,1,30,TEST_SITE_POINTS)); if(state?.testSite){state.testSite.maxHp=TEST_SITE_POINTS; state.testSite.hp=Math.min(TEST_SITE_POINTS,state.testSite.hp); markBoardDirty();}}
  if(name==='TEST_SITE_RESPAWN_DELAY')TEST_SITE_RESPAWN_DELAY=clampBalance(val,0,10,TEST_SITE_RESPAWN_DELAY);
  if(name==='CHEESE_XP_PER_HP')CHEESE_XP_PER_HP=clampBalance(val,0,5,CHEESE_XP_PER_HP);
  if(name==='COMBAT_XP_PER_HP')COMBAT_XP_PER_HP=clampBalance(val,0,5,COMBAT_XP_PER_HP);
  if(name==='UNIT_KILL_XP_MULT')UNIT_KILL_XP_MULT=clampBalance(val,0,5,UNIT_KILL_XP_MULT);
  if(name==='PURGE_HP_REMAINING')PURGE_HP_REMAINING=clampBalance(val,.01,1,PURGE_HP_REMAINING);
  if(name==='OWNERSHIP_TRANSFER')OWNERSHIP_TRANSFER=clampBalance(val,.05,1,OWNERSHIP_TRANSFER);
  if(name==='MATCH_LENGTH')MATCH_LENGTH=Math.round(clampBalance(val,30,900,MATCH_LENGTH));
  if(name==='PLAYER_SPAWN_INTERVAL'){PLAYER_SPAWN_INTERVAL=clampBalance(val,.25,10,PLAYER_SPAWN_INTERVAL);setAllPlayerTiming();}
  if(name==='PLAYER_MAZE_INTERVAL'){PLAYER_MAZE_INTERVAL=clampBalance(val,.25,10,PLAYER_MAZE_INTERVAL);setAllPlayerTiming();}
  if(name==='PLAYER_MAZE_CAP'){PLAYER_MAZE_CAP=Math.round(clampBalance(val,1,5,PLAYER_MAZE_CAP));setAllPlayerTiming();}
  if(name==='RELIC_SPAWN_INTERVAL'){RELIC_SPAWN_INTERVAL=clampBalance(val,3,60,RELIC_SPAWN_INTERVAL); if(state)state.relicTimer=Math.min(state.relicTimer,RELIC_SPAWN_INTERVAL);}
  if(name==='RELIC_HP')RELIC_HP=clampBalance(val,1,60,RELIC_HP);
  if(name==='NPC_EVAL_TILE_COUNT')NPC_EVAL_TILE_COUNT=Math.round(clampBalance(val,1,25,NPC_EVAL_TILE_COUNT));
  if(name==='NPC_SCORE_NOISE')NPC_SCORE_NOISE=clampBalance(val,0,50,NPC_SCORE_NOISE);
  if(name==='NPC_HESITATE_CHANCE')NPC_HESITATE_CHANCE=clampBalance(val,0,1,NPC_HESITATE_CHANCE);
  if(name==='NPC_STRONG_THRESHOLD')NPC_STRONG_THRESHOLD=clampBalance(val,-20,40,NPC_STRONG_THRESHOLD);
  if(name==='SHOW_SPAWN_TIMER')SHOW_SPAWN_TIMER=!!val;
  if(name==='SHOW_CHEESE_TIMER')SHOW_CHEESE_TIMER=!!val;
  if(name==='SHOW_MODE_TEXT')SHOW_MODE_TEXT=!!val;
  if(name==='SHOW_ROTATE_TIMER')SHOW_ROTATE_TIMER=!!val;
  if(name==='SHOW_UPGRADE_XP_TIMER')SHOW_UPGRADE_XP_TIMER=!!val;
  if(name==='SHOW_PATH_GLOW'){SHOW_PATH_GLOW=!!val; markBoardDirty();}
  if(name==='NPC_OKAY_THRESHOLD')NPC_OKAY_THRESHOLD=clampBalance(val,-30,30,NPC_OKAY_THRESHOLD);
}
function updateDebugStats(){if(!state)return; const A=state.players.A,B=state.players.B; const stats=$('#debugStats'); if(!stats)return; stats.textContent=`time ${state.time.toFixed(1)} / ${MATCH_LENGTH}s paused ${paused}
A points/tile/upgrades/XP ${A.score}/${A.mazeActions}/${A.up}/${fmtXP(A.xp)}
B points/tile/upgrades/XP ${B.score}/${B.mazeActions}/${B.up}/${fmtXP(B.xp)}
units A/B ${state.units.filter(u=>u.team==='A').length}/${state.units.filter(u=>u.team==='B').length}
test site ${state.testSite?key(state.testSite.x,state.testSite.y)+' '+(state.testSite.active?'live':'preview')+' hp '+Math.ceil(state.testSite.hp)+' respawn '+(state.testSite.respawnTimer||0).toFixed(1):'none'}
cheese ${state.relics.map(r=>key(r.x,r.y)+' hp '+Math.ceil(r.hp)).join(' ')||'none'}
A levels ${JSON.stringify(A.unitLevel)} next ${A.nextSpawn} odds ${spawnOddsText(A)}
B levels ${JSON.stringify(B.unitLevel)} next ${B.nextSpawn} odds ${spawnOddsText(B)}
NPC ${A.lastReason}
A tile ${A.currentTile?A.currentTile.o:'?'} next ${A.nextTile?A.nextTile.o:'?'}
B tile ${B.currentTile?B.currentTile.o:'?'} next ${B.nextTile?B.nextTile.o:'?'}
${(A.lastScores||[]).map(s=>`cand ${s.x},${s.y} eval ${s.score?.toFixed(1)} ${s.parts?.join(' ')}`).join('\n')}`;}
function renderDebug(){if(!$('#debug').dataset.built)buildDebugPanel(); updateDebugStats();}
function pulse(sel){const el=$(sel); if(!el)return; el.classList.remove('pulse'); void el.offsetWidth; el.classList.add('pulse');}
function status(txt){$('#statusLine').textContent=txt;}
function loop(ts){if(!last)last=ts; let dt=Math.min(.1,(ts-last)/1000); last=ts; if(canSimulate()){if(running&&!paused&&!state?.ended)moveUnits(dt); acc+=dt; while(acc>=TICK){tick(TICK);acc-=TICK;}} spawnCenterScoreFx(dt); if(state?.boardDirty){renderBoard();state.boardDirty=false;} renderBoardLocal(); renderUnits(); renderTop(); if(debugOn)renderDebug(); requestAnimationFrame(loop);}
function netHint(txt){const el=$('#netHint'); if(el)el.textContent=txt; status(txt);}
function makePin(){return String(Math.floor(1000+Math.random()*9000));}
function peerId(pin){return 'maze-battler-'+pin;}
function closePeer(){try{conn&&conn.close();}catch(e){} try{peer&&peer.destroy();}catch(e){} conn=null; peer=null; connected=false; renderRemoteCursor({visible:false});}
function enterGame(){document.body.classList.add('gameStarted'); const st=$('#start'); if(st)st.classList.add('hidden');}
function resetStartScreen(){closePeer(); running=false; paused=false; const st=$('#start'); if(st){st.classList.remove('hosting','joining','hidden');} document.body.classList.remove('gameStarted'); const pb=$('#pinBox'); if(pb){pb.style.display='none';pb.textContent='----';} const pi=$('#pinInput'); if(pi)pi.value=''; const cancel=$('#cancelNetBtn'); if(cancel)cancel.style.display='none'; netHint('Play maze tiles. Chase the test site. Steal the cheese.');}
function showJoinStart(){const st=$('#start'); if(st){st.classList.remove('hosting');st.classList.add('joining');} const cancel=$('#cancelNetBtn'); if(cancel)cancel.style.display='inline-block'; const pin=$('#pinInput'); if(pin)pin.focus(); netHint('Enter the host PIN to join the experiment.');}
function showHostStart(){const st=$('#start'); if(st){st.classList.remove('joining');st.classList.add('hosting');} const cancel=$('#cancelNetBtn'); if(cancel)cancel.style.display='inline-block';}
function startSolo(){closePeer(); playMode='solo'; localTeam='B'; isHost=false; init(); enterGame(); running=true; paused=false; renderAll();}
function startHost(){
  if(typeof Peer==='undefined'){netHint('PeerJS did not load. Internet is needed for PIN multiplayer.'); return;}
  closePeer(); playMode='host'; localTeam='B'; isHost=true; running=false; paused=false; init(); showHostStart();
  const pin=makePin(); $('#pinBox').style.display='block'; $('#pinBox').textContent=pin; netHint('Waiting for orange player...');
  peer=new Peer(peerId(pin),{debug:1});
  peer.on('open',()=>netHint('PIN '+pin+' ready. Waiting for orange player...'));
  peer.on('connection',c=>{ if(conn){c.close(); return;} conn=c; wireConnection(c); });
  peer.on('error',err=>{netHint('Host error: '+(err.type||err.message||err)); if((err.type||'')==='unavailable-id')startHost();});
}
function startJoin(){
  if(typeof Peer==='undefined'){netHint('PeerJS did not load. Internet is needed for PIN multiplayer.'); return;}
  const pin=($('#pinInput').value||'').replace(/\D/g,'').slice(0,4); if(pin.length!==4){netHint('Enter the 4-number host PIN.'); return;}
  closePeer(); playMode='join'; localTeam='A'; isHost=false; running=false; paused=false; $('#pinBox').style.display='none'; netHint('Joining '+pin+'...');
  peer=new Peer(undefined,{debug:1});
  peer.on('open',()=>{conn=peer.connect(peerId(pin),{reliable:true,serialization:'json'}); wireConnection(conn);});
  peer.on('error',err=>netHint('Join error: '+(err.type||err.message||err)));
}
function wireConnection(c){
  c.on('open',()=>{connected=true; if(playMode==='host'){running=true; paused=false; enterGame(); netHint('Orange connected. You are blue.'); broadcastState(true);} else {enterGame(); netHint('Connected. You are orange.'); sendToPeer({type:'hello'});} renderAll();});
  c.on('data',msg=>handleNetMessage(msg));
  c.on('close',()=>{connected=false; renderRemoteCursor({visible:false}); netHint('Connection closed.');});
  c.on('error',err=>netHint('Connection error: '+(err.message||err)));
}
function handleNetMessage(msg){
  if(!msg||typeof msg!=='object')return;
  if(msg.type==='cursor'){renderRemoteCursor(msg); return;}
  if(playMode==='host'){
    if(msg.type==='input'&&msg.team==='A'){
      if(msg.action==='rotate'||msg.action==='place')tryPlaceTile('A',msg.x,msg.y,'remote');
      if(msg.action==='upgrade')queueUpgrade('A',msg.cls);
      if(msg.action==='power'&&msg.power==='centerPurge')useCenterPurge('A');
      broadcastState(true);
    }
    if(msg.type==='restart'){init(); running=true; paused=false; $('#end').style.display='none'; broadcastState(true);}
  } else if(playMode==='join'){
    if(msg.type==='state')applyRemoteState(msg);
  }
}
function requestPlace(x,y){
  if(!state)return false;
  if(playMode==='join'){sendToPeer({type:'input',action:'place',team:'A',x,y}); return true;}
  return tryPlaceTile(localTeam,x,y,'local');
}
function requestRotate(x,y){return requestPlace(x,y);}
function requestUpgrade(cls){
  if(!state)return false;
  if(playMode==='join'){sendToPeer({type:'input',action:'upgrade',team:'A',cls}); return true;}
  return queueUpgrade(localTeam,cls);
}
function requestPower(power){
  if(!state)return false;
  if(power!=='centerPurge')return false;
  if(playMode==='join'){sendToPeer({type:'input',action:'power',team:'A',power}); return true;}
  return useCenterPurge(localTeam);
}
$('#soloBtn').onclick=startSolo;
$('#hostBtn').onclick=startHost;
$('#joinBtn').onclick=()=>{const st=$('#start'); if(st&&st.classList.contains('joining'))startJoin(); else showJoinStart();};
$('#cancelNetBtn').onclick=resetStartScreen;
$('#pinInput').addEventListener('keydown',e=>{if(e.key==='Enter')startJoin();});
$('#restartBtn').onclick=()=>{if(playMode==='join'){sendToPeer({type:'restart'});return;} init();$('#end').style.display='none';running=true;paused=false;broadcastState(true);};
$('#pauseBtn').onclick=()=>{if(playMode==='join'){status('host controls pause');return;} paused=!paused;renderAll();broadcastState(true);};
$('#debugBtn').onclick=()=>{debugOn=!debugOn;$('#debug').classList.toggle('show',debugOn);renderAll();};
$('#spawnBtn').onclick=()=>{const p=me()||state.players.A; status('spawn odds '+spawnOddsText(p));$('#upgradeTray').classList.remove('show');};
$('#upgradeBtn').onclick=()=>{const p=me()||state.players.A; status(p.up>0?'choose an upgrade above your spawn':'no upgrade ready');};

const boardWrapEl=document.querySelector('.boardWrap');
const dragLine=$('#tileDragLine'), dragGhost=$('#tileDragGhost');

function boardPointToTile(clientX,clientY){
  if(!boardEl)return null;
  const r=boardEl.getBoundingClientRect();
  if(clientX<r.left||clientX>r.right||clientY<r.top||clientY>r.bottom)return null;
  const style=getComputedStyle(boardEl);
  const pad=parseFloat(style.paddingLeft)||0;
  const gap=parseFloat(style.columnGap)||parseFloat(style.gap)||0;
  const innerW=r.width-pad*2-gap*4;
  const innerH=r.height-pad*2-gap*4;
  const cellW=innerW/5, cellH=innerH/5;
  const lx=clientX-r.left-pad;
  const ly=clientY-r.top-pad;
  if(lx<0||ly<0||lx>innerW+gap*4||ly>innerH+gap*4)return null;
  const stepX=cellW+gap, stepY=cellH+gap;
  const col=Math.floor(lx/stepX), row=Math.floor(ly/stepY);
  if(col<0||col>=5||row<0||row>=5)return null;
  const inCellX=lx-col*stepX, inCellY=ly-row*stepY;
  if(inCellX<0||inCellX>cellW||inCellY<0||inCellY>cellH)return null;
  return {x:col+1,y:row+1};
}
function tileFromPointerEvent(e){return boardPointToTile(e.clientX,e.clientY);}
function clearDropHighlights(){document.querySelectorAll('.tile.legalDrop,.tile.dropHover,.tile.illegalDrop,.tile.dropReject').forEach(el=>el.classList.remove('legalDrop','dropHover','illegalDrop','dropReject'));}
function updateDropHighlights(target=null){
  clearDropHighlights();
  if(!dragTileState||!state)return;
  for(let y=1;y<=5;y++)for(let x=1;x<=5;x++){
    const el=document.querySelector(`[data-x="${x}"][data-y="${y}"]`); if(!el)continue;
    const legal=canPlaceTile(localTeam,x,y).ok;
    if(!legal)el.classList.add('illegalDrop');
    else el.classList.add('legalDrop');
    if(target&&target.x===x&&target.y===y)el.classList.add(legal?'dropHover':'dropReject');
  }
}
function updateDragVisual(clientX,clientY,target=null){
  if(!dragTileState)return;
  const legal=target?canPlaceTile(localTeam,target.x,target.y).ok:false;
  if(dragGhost){dragGhost.className='tileDragGhost show '+(legal?'valid':'invalid'); dragGhost.style.left=clientX+'px'; dragGhost.style.top=clientY+'px'; dragGhost.innerHTML=miniTileHTML(dragTileState.tile);}
  if(dragLine){const sx=dragTileState.startX, sy=dragTileState.startY; const dx=clientX-sx, dy=clientY-sy; const len=Math.hypot(dx,dy); const ang=Math.atan2(dy,dx)*180/Math.PI; dragLine.className='tileDragLine show'; dragLine.style.width=len+'px'; dragLine.style.transform=`translate(${sx}px,${sy}px) rotate(${ang}deg)`;}
}
function startTileDrag(e){
  if(!state||paused||state.ended)return;
  const p=me();
  if(!p||p.mazeActions<1){status('tile charging'); pulse('#tileHand'); return;}
  e.preventDefault(); e.stopPropagation();
  const rect=e.currentTarget.getBoundingClientRect();
  dragTileState={pointerId:e.pointerId,tile:cloneTileCard(p.currentTile||tTile(0)),startX:rect.left+rect.width/2,startY:rect.top+rect.height/2,target:null};
  e.currentTarget.setPointerCapture?.(e.pointerId);
  renderTileHand();
  const target=boardPointToTile(e.clientX,e.clientY);
  dragTileState.target=target;
  updateDropHighlights(target);
  updateDragVisual(e.clientX,e.clientY,target);
}
function moveTileDrag(e){
  sendCursor(e,true);
  if(!dragTileState)return;
  e.preventDefault();
  const target=boardPointToTile(e.clientX,e.clientY);
  dragTileState.target=target;
  updateDropHighlights(target);
  updateDragVisual(e.clientX,e.clientY,target);
}
function endTileDrag(e){
  if(!dragTileState)return;
  e.preventDefault();
  const target=dragTileState.target||boardPointToTile(e.clientX,e.clientY);
  const ok=target&&requestPlace(target.x,target.y);
  if(!ok){status('illegal tile placement'); pulse('#tileHand');}
  dragTileState=null;
  clearDropHighlights();
  if(dragGhost)dragGhost.className='tileDragGhost';
  if(dragLine)dragLine.className='tileDragLine';
  renderTileHand();
}
const curTileCard=$('#currentTileCard');
if(curTileCard){curTileCard.addEventListener('pointerdown',startTileDrag); curTileCard.addEventListener('pointermove',moveTileDrag); curTileCard.addEventListener('pointerup',endTileDrag); curTileCard.addEventListener('pointercancel',endTileDrag);}
window.addEventListener('pointermove',moveTileDrag,{passive:false});
window.addEventListener('pointerup',endTileDrag,{passive:false});
boardEl.addEventListener('pointermove',e=>{sendCursor(e,true);});
function hideRotCursor(send=true){boardEl.classList.remove('cursoring'); rotCursorTile=null; rotCursorMode='noAction'; if(rotCursor)rotCursor.classList.remove('show','locked','noAction','reject'); if(send)sendCursor({clientX:0,clientY:0},false);}
boardEl.addEventListener('pointerleave',()=>hideRotCursor(true));
boardEl.addEventListener('pointercancel',()=>hideRotCursor(true));


init(); requestAnimationFrame(loop);
})();
</script>
