<script>
(() => {

  grunt:{hp:6,speed:1,damage:1,interval:1,frag:1,icon:'●'},
  bruiser:{hp:10,speed:.75,damage:2,interval:1.25,frag:2,icon:'■'},

  grunt:{name:'Grunt',effect:'+1 HP, +0.05 speed per level after 1'},
  runner:{name:'Runner',effect:'Level 1 unlocks. +1 HP, +0.10 speed per level after 1'},

const $=s=>document.querySelector(s); const boardEl=$('#board'), unitLayer=$('#unitLayer'), upgradePrompt=$('#upgradePrompt'), rotCursor=$('#rotCursor'), remoteCursor=$('#remoteCursor');

let localScoreFx=[], scoreFxSeq=1, scoreFxCarry=0;

let playMode='solo', localTeam='A', isHost=false, peer=null, conn=null, connected=false, remoteSnapshotAt=0, lastBroadcastAt=0, lastCursorSentAt=0;
function key(x,y){return x+','+y} function inb(x,y){return x>=1&&x<=W&&y>=1&&y<=H} function man(a,b=CENTER){return Math.abs(a.x-b.x)+Math.abs(a.y-b.y)}
function visualLead(){if(!state||!running||paused||state.ended)return 0; if(playMode==='join')return Math.min(.25,(performance.now()-remoteSnapshotAt)/1000); return acc;}
function visualTime(){return state?state.time+visualLead():0;}
function smoothTimer(current,interval){return Math.max(0,Math.min(interval,current+visualLead()));}
function smoothDeg(current,interval){return Math.min(360,smoothTimer(current,interval)/interval*360);}
function spawnPct(team){const p=state?.players?.[team]; return p?Math.max(0,Math.min(100,smoothTimer(p.spawnTimer,p.spawnInterval)/p.spawnInterval*100)):0;}
function me(){return state?.players?.[localTeam];}
function isCenterTile(x,y){return x===3&&y===3;}
function isTilePlayerRotatable(x,y){return inb(x,y);}
function rotateCooldownDeg(){const p=me(); return p?(p.mazeActions>=1?360:smoothDeg(p.mazeTimer,p.mazeInterval)):0;}
function cursorPct(){return rotateCooldownDeg();}
function cursorModeFor(x,y){if(!state)return 'noAction'; const p=me(); if(!p||p.mazeActions<1||state.pendingRotation)return 'noAction'; return 'canAct';}
function paintRotCursor(mode,clientX,clientY,temporary=false){
  if(!rotCursor)return;
  boardEl.classList.add('cursoring');
  rotCursorMode=mode;
  rotCursor.className='rotCursor show '+(mode==='locked'?'locked':mode==='noAction'?'noAction':'');

  rotCursor.style.top=clientY+'px';

function updateRotCursorVisual(){
  if(!rotCursor||!rotCursor.classList.contains('show'))return;

  rotCursor.classList.toggle('locked',mode==='locked');

function canSimulate(){return playMode==='solo'||playMode==='host';}
function sendToPeer(msg){if(conn&&conn.open)conn.send(msg);}
function sendCursor(e,visible=true){if(playMode==='solo'||!conn||!conn.open)return; const now=performance.now(); if(visible&&now-lastCursorSentAt<45)return; lastCursorSentAt=now; const r=boardEl.getBoundingClientRect(); const x=(e.clientX-r.left)/r.width, y=(e.clientY-r.top)/r.height; sendToPeer({type:'cursor',team:localTeam,x:Math.max(0,Math.min(1,x)),y:Math.max(0,Math.min(1,y)),visible});}

function broadcastState(force=false){if(playMode!=='host'||!conn||!conn.open||!state)return; const now=performance.now(); if(!force&&now-lastBroadcastAt<90)return; lastBroadcastAt=now; conn.send({type:'state',state,uid,rid,running,paused,debugOn});}
function applyRemoteState(msg){state=msg.state; uid=msg.uid||uid; rid=msg.rid||rid; running=!!msg.running; paused=!!msg.paused; remoteSnapshotAt=performance.now(); if(state&&state.rotationAnim){if(lastSeenRotationAnimId!==state.rotationAnim.id){lastSeenRotationAnimId=state.rotationAnim.id; remoteRotationAnimStartedAt=performance.now();} state.rotationAnim.startedAt=remoteRotationAnimStartedAt;} else {lastSeenRotationAnimId=null; remoteRotationAnimStartedAt=null;} markBoardDirty(); renderAll(); renderEndState();}
function cloneBoard(board){return board.map(t=>({...t}))}
function tileAt(board,x,y){return board[(y-1)*W+(x-1)]}
function openings(t){
  if(t.type==='straight') return t.o%2===0 ? {n:1,e:0,s:1,w:0} : {n:0,e:1,s:0,w:1};

function neigh(board,x,y){return DIRS.filter(d=>canMove(board,x,y,d)).map(d=>({x:x+d.dx,y:y+d.dy,d}));}
function bfs(board,start,target){

function currentTargetResult(unit, board=state.board){

function selectNewTarget(unit, board=state.board){

    if(centerPath) return {target:CENTER,path:centerPath,kind:'center'};
    if(anyRelic) return {target:{x:anyRelic.r.x,y:anyRelic.r.y},path:anyRelic.p,kind:'relic'};
    const enemy=nearestPathableEnemy(board,start,unit.team);
    if(enemy) return {target:{x:enemy.e.x,y:enemy.e.y},path:enemy.p,kind:'enemy',targetEnemyId:enemy.e.id};
  }

    if(enemy) return {target:{x:enemy.e.x,y:enemy.e.y},path:enemy.p,kind:'enemy',targetEnemyId:enemy.e.id};
    const anyRelic=nearestPathableRelic(board,start);

  }

    const anyRelic=nearestPathableRelic(board,start);

NPC memory ${JSON.stringify(A.npcMemory)}
${(A.lastScores||[]).map(s=>`cand ${s.x},${s.y} score ${s.score?.toFixed(1)} ${s.parts?.join(' ')}`).join('\n')}`;}
function pulse(sel){const el=$(sel); if(!el)return; el.classList.remove('pulse'); void el.offsetWidth; el.classList.add('pulse');}
function status(txt){$('#statusLine').textContent=txt;}
function loop(ts){if(!last)last=ts; let dt=Math.min(.1,(ts-last)/1000); last=ts; if(canSimulate()){if(running&&!paused&&!state?.ended)moveUnits(dt); acc+=dt; while(acc>=TICK){tick(TICK);acc-=TICK;}} spawnCenterScoreFx(dt); if(state?.boardDirty){renderBoard();state.boardDirty=false;} renderBoardLocal(); renderUnits(); renderLiveMeters(); if(debugOn)renderDebug(); requestAnimationFrame(loop);}
function netHint(txt){const el=$('#netHint'); if(el)el.textContent=txt; status(txt);}
function makePin(){return String(Math.floor(1000+Math.random()*9000));}
function peerId(pin){return 'maze-battler-'+pin;}
function closePeer(){try{conn&&conn.close();}catch(e){} try{peer&&peer.destroy();}catch(e){} conn=null; peer=null; connected=false; renderRemoteCursor({visible:false});}
function enterGame(){document.body.classList.add('gameStarted'); const st=$('#start'); if(st)st.classList.add('hidden');}
function resetStartScreen(){closePeer(); running=false; paused=false; const st=$('#start'); if(st){st.classList.remove('hosting','joining','hidden');} document.body.classList.remove('gameStarted'); const pb=$('#pinBox'); if(pb){pb.style.display='none';pb.textContent='----';} const pi=$('#pinInput'); if(pi)pi.value=''; const cancel=$('#cancelNetBtn'); if(cancel)cancel.style.display='none'; netHint('Rotate the maze. Swarm the test site. Steal the cheese.');}
function showJoinStart(){const st=$('#start'); if(st){st.classList.remove('hosting');st.classList.add('joining');} const cancel=$('#cancelNetBtn'); if(cancel)cancel.style.display='inline-block'; const pin=$('#pinInput'); if(pin)pin.focus(); netHint('Enter the host PIN to join the experiment.');}
function showHostStart(){const st=$('#start'); if(st){st.classList.remove('joining');st.classList.add('hosting');} const cancel=$('#cancelNetBtn'); if(cancel)cancel.style.display='inline-block';}
function startSolo(){closePeer(); playMode='solo'; localTeam='B'; isHost=false; init(); enterGame(); running=true; paused=false; renderAll();}
function startHost(){
  if(typeof Peer==='undefined'){netHint('PeerJS did not load. Internet is needed for PIN multiplayer.'); return;}
  closePeer(); playMode='host'; localTeam='B'; isHost=true; running=false; paused=false; init(); showHostStart();
  const pin=makePin(); $('#pinBox').style.display='block'; $('#pinBox').textContent=pin; netHint('Waiting for orange player...');
  peer=new Peer(peerId(pin),{debug:1});
  peer.on('open',()=>netHint('PIN '+pin+' ready. Waiting for orange player...'));
  peer.on('connection',c=>{ if(conn){c.close(); return;} conn=c; wireConnection(c); });
  peer.on('error',err=>{netHint('Host error: '+(err.type||err.message||err)); if((err.type||'')==='unavailable-id')startHost();});
}
function startJoin(){
  if(typeof Peer==='undefined'){netHint('PeerJS did not load. Internet is needed for PIN multiplayer.'); return;}
  const pin=($('#pinInput').value||'').replace(/\D/g,'').slice(0,4); if(pin.length!==4){netHint('Enter the 4-number host PIN.'); return;}
  closePeer(); playMode='join'; localTeam='A'; isHost=false; running=false; paused=false; $('#pinBox').style.display='none'; netHint('Joining '+pin+'...');
  peer=new Peer(undefined,{debug:1});
  peer.on('open',()=>{conn=peer.connect(peerId(pin),{reliable:true,serialization:'json'}); wireConnection(conn);});
  peer.on('error',err=>netHint('Join error: '+(err.type||err.message||err)));
}
function wireConnection(c){
  c.on('open',()=>{connected=true; if(playMode==='host'){running=true; paused=false; enterGame(); netHint('Orange connected. You are blue.'); broadcastState(true);} else {enterGame(); netHint('Connected. You are orange.'); sendToPeer({type:'hello'});} renderAll();});
  c.on('data',msg=>handleNetMessage(msg));
  c.on('close',()=>{connected=false; renderRemoteCursor({visible:false}); netHint('Connection closed.');});
  c.on('error',err=>netHint('Connection error: '+(err.message||err)));
}
function handleNetMessage(msg){
  if(!msg||typeof msg!=='object')return;
  if(msg.type==='cursor'){renderRemoteCursor(msg); return;}
  if(playMode==='host'){
    if(msg.type==='input'&&msg.team==='A'){
      if(msg.action==='rotate')tryRotateTile('A',msg.x,msg.y,'remote');
      if(msg.action==='upgrade')queueUpgrade('A',msg.cls);
      if(msg.action==='power'&&msg.power==='centerPurge')useCenterPurge('A');
      broadcastState(true);
    }
    if(msg.type==='restart'){init(); running=true; paused=false; $('#end').style.display='none'; broadcastState(true);}
  } else if(playMode==='join'){
    if(msg.type==='state')applyRemoteState(msg);
  }
}
function requestRotate(x,y){
  if(!state)return false;
  if(playMode==='join'){sendToPeer({type:'input',action:'rotate',team:'A',x,y}); return true;}
  return tryRotateTile(localTeam,x,y,'local');
}
function requestUpgrade(cls){
  if(!state)return false;
  if(playMode==='join'){sendToPeer({type:'input',action:'upgrade',team:'A',cls}); return true;}
  return queueUpgrade(localTeam,cls);
}
function requestPower(power){
  if(!state)return false;
  if(power!=='centerPurge')return false;
  if(playMode==='join'){sendToPeer({type:'input',action:'power',team:'A',power}); return true;}
  return useCenterPurge(localTeam);
}
$('#soloBtn').onclick=startSolo;
$('#hostBtn').onclick=startHost;
$('#joinBtn').onclick=()=>{const st=$('#start'); if(st&&st.classList.contains('joining'))startJoin(); else showJoinStart();};
$('#cancelNetBtn').onclick=resetStartScreen;
$('#pinInput').addEventListener('keydown',e=>{if(e.key==='Enter')startJoin();});
$('#restartBtn').onclick=()=>{if(playMode==='join'){sendToPeer({type:'restart'});return;} init();$('#end').style.display='none';running=true;paused=false;broadcastState(true);};
$('#pauseBtn').onclick=()=>{if(playMode==='join'){status('host controls pause');return;} paused=!paused;renderAll();broadcastState(true);};
$('#debugBtn').onclick=()=>{debugOn=!debugOn;$('#debug').classList.toggle('show',debugOn);renderAll();};
$('#spawnBtn').onclick=()=>{const p=me()||state.players.A; status('spawn odds '+spawnOddsText(p));$('#upgradeTray').classList.remove('show');};
$('#upgradeBtn').onclick=()=>{const p=me()||state.players.A; status(p.up>0?'choose an upgrade above your spawn':'no upgrade ready');};
const boardWrapEl=document.querySelector('.boardWrap');

function boardPointToTile(clientX,clientY){
  if(!boardEl)return null;
  const r=boardEl.getBoundingClientRect();
  if(clientX<r.left||clientX>r.right||clientY<r.top||clientY>r.bottom)return null;
  const style=getComputedStyle(boardEl);
  const pad=parseFloat(style.paddingLeft)||0;
  const gap=parseFloat(style.columnGap)||parseFloat(style.gap)||0;
  const innerW=r.width-pad*2-gap*4;
  const innerH=r.height-pad*2-gap*4;
  const cellW=innerW/5, cellH=innerH/5;
  const lx=clientX-r.left-pad;
  const ly=clientY-r.top-pad;
  if(lx<0||ly<0||lx>innerW+gap*4||ly>innerH+gap*4)return null;
  const stepX=cellW+gap, stepY=cellH+gap;
  const col=Math.floor(lx/stepX), row=Math.floor(ly/stepY);
  if(col<0||col>=5||row<0||row>=5)return null;
  const inCellX=lx-col*stepX, inCellY=ly-row*stepY;
  if(inCellX<0||inCellX>cellW||inCellY<0||inCellY>cellH)return null;
  return {x:col+1,y:row+1};
}
function tileFromPointerEvent(e){return boardPointToTile(e.clientX,e.clientY);}
function handleBoardPointerDown(e){
  if(e.target&&e.target.closest&&e.target.closest('.upgradePrompt,.upgrade,button'))return;
  const tile=tileFromPointerEvent(e);
  if(!tile)return;
  e.preventDefault();
  e.stopPropagation();
  const mode=cursorModeFor(tile.x,tile.y);
  paintRotCursor(mode,e.clientX,e.clientY,false);
  if(mode!=='canAct'){
    bumpRotCursor();
    return;
  }
  if(!requestRotate(tile.x,tile.y)) bumpRotCursor();
}
boardWrapEl.addEventListener('pointerdown',handleBoardPointerDown,{capture:true});
boardWrapEl.addEventListener('touchstart',e=>{
  if(e.target&&e.target.closest&&e.target.closest('.upgradePrompt,.upgrade,button'))return;
  const t=e.changedTouches&&e.changedTouches[0];
  if(!t)return;
  const tile=boardPointToTile(t.clientX,t.clientY);
  if(!tile)return;
  e.preventDefault();
  e.stopPropagation();
  const mode=cursorModeFor(tile.x,tile.y);
  paintRotCursor(mode,t.clientX,t.clientY,true);
  if(mode!=='canAct'){
    bumpRotCursor();
    return;
  }
  if(!requestRotate(tile.x,tile.y)) bumpRotCursor();
},{capture:true,passive:false});
boardEl.addEventListener('pointermove',e=>{sendCursor(e,true); const tile=tileFromPointerEvent(e); if(!tile||!rotCursor)return hideRotCursor(false); paintRotCursor(cursorModeFor(tile.x,tile.y),e.clientX,e.clientY,false);});
function hideRotCursor(send=true){boardEl.classList.remove('cursoring'); rotCursorTile=null; rotCursorMode='noAction'; if(rotCursor)rotCursor.classList.remove('show','locked','noAction','reject'); if(send)sendCursor({clientX:0,clientY:0},false);}
boardEl.addEventListener('pointerleave',()=>hideRotCursor(true));
boardEl.addEventListener('pointercancel',()=>hideRotCursor(true));

init(); requestAnimationFrame(loop);
})();
</script>
