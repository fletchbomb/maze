<style>

.iconRing:after{content:"";position:absolute;inset:5px;border-radius:50%;background:var(--panel);box-shadow:inset 0 0 0 1px rgba(255,255,255,.06)}.iconRing span{position:relative; z-index:1; font-size:20px}.bubble{position:absolute;z-index:2;right:-5px;bottom:-3px;min-width:18px;height:18px;border-radius:999px;display:grid;place-items:center;background:#fff;color:#15151d;font-size:12px;font-weight:900;padding:0 4px;box-shadow:0 2px 7px rgba(0,0,0,.35)}

.tile.center:before{content:"";position:absolute;inset:5px;border-radius:15px;border:3px solid rgba(255,255,255,.5);z-index:5;pointer-events:none}.tile.spawnA .spawnMark,.tile.spawnB .spawnMark{position:absolute;left:8px;right:8px;height:5px;border-radius:9px;z-index:4}.tile.spawnA .spawnMark{top:8px;background:var(--a)}.tile.spawnB .spawnMark{bottom:8px;background:var(--b)}.tile.lastChanged{box-shadow:0 0 0 3px rgba(255,77,100,.42), inset 0 -5px 0 rgba(0,0,0,.09),0 6px 16px rgba(0,0,0,.24)}.tile.lastChanged .lockMark{opacity:1}.lockMark{position:absolute;right:6px;top:6px;width:13px;height:13px;border-radius:50%;background:var(--red);box-shadow:0 0 0 3px rgba(255,77,100,.2),0 0 12px rgba(255,77,100,.75);opacity:.0;z-index:11}.tile.pending .lockMark{animation:lockPulse .32s infinite alternate}@keyframes lockPulse{to{transform:scale(1.2);filter:brightness(1.2)}}
.arm,.core{position:absolute;background:linear-gradient(145deg,#8c663d,#5f4329);z-index:1;box-shadow:inset 0 2px 0 rgba(255,255,255,.12), inset 0 -2px 0 rgba(0,0,0,.25)}.core{width:38%;height:38%;left:31%;top:31%;border-radius:9px}.arm.n{width:28%;height:39%;left:36%;top:0;border-radius:0 0 9px 9px}.arm.s{width:28%;height:39%;left:36%;bottom:0;border-radius:9px 9px 0 0}.arm.e{height:28%;width:39%;right:0;top:36%;border-radius:9px 0 0 9px}.arm.w{height:28%;width:39%;left:0;top:36%;border-radius:0 9px 9px 0}.flowA,.flowB,.flowBoth{position:absolute;inset:0;z-index:0;opacity:1;transition:opacity .18s}.flowA{background:rgba(255,107,58,.16)}.flowB{background:rgba(67,169,255,.16)}.flowBoth{background:linear-gradient(135deg,rgba(255,107,58,.2),rgba(67,169,255,.2))}.routePulse{animation:routePulse .5s ease-out}@keyframes routePulse{0%{filter:brightness(1.6)}100%{filter:brightness(1)}}.fallbackDot{position:absolute;left:50%;top:50%;width:24%;height:24%;transform:translate(-50%,-50%);border-radius:50%;border:2px dashed rgba(255,255,255,.7);box-shadow:0 0 14px rgba(255,255,255,.28);z-index:3;animation:fallbackPulse .65s infinite alternate}@keyframes fallbackPulse{to{transform:translate(-50%,-50%) scale(1.14);opacity:.72}}
.relic{position:absolute;z-index:7;left:50%;top:50%;transform:translate(-50%,-50%);width:22%;height:22%;background:var(--gold);clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%);filter:drop-shadow(0 2px 4px rgba(0,0,0,.45));animation:relicPulse 1.2s infinite alternate}@keyframes relicPulse{to{transform:translate(-50%,-50%) scale(1.16)}}
.spawnGhost{position:absolute;z-index:6;left:50%;top:50%;width:30%;height:30%;transform:translate(-50%,-50%);--spawnPct:0%;--ghostFull:#1d2027;--ghostEmpty:rgba(255,255,255,.45);filter:grayscale(1) drop-shadow(0 2px 3px rgba(0,0,0,.32));opacity:.92;pointer-events:none}.spawnGhost.grunt,.spawnGhost.bruiser{border:2px solid rgba(20,22,28,.78);background:linear-gradient(to top,var(--ghostFull) var(--spawnPct),var(--ghostEmpty) var(--spawnPct))}.spawnGhost.grunt{border-radius:50%}.spawnGhost.bruiser{border-radius:4px}.spawnGhost.runner:before,.spawnGhost.runner:after{content:"";position:absolute;left:41%;top:-7%;width:18%;height:114%;border-radius:999px;background:linear-gradient(to top,var(--ghostFull) var(--spawnPct),var(--ghostEmpty) var(--spawnPct));box-shadow:0 0 0 2px rgba(20,22,28,.58)}.spawnGhost.runner:before{transform:rotate(45deg)}.spawnGhost.runner:after{transform:rotate(-45deg)}.spawnGhost:after{content:"";position:absolute;inset:-8px;border-radius:999px;background:conic-gradient(rgba(30,32,39,.9) var(--spawnDeg,0deg),rgba(255,255,255,.2) 0);-webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 3px),#000 0);mask:radial-gradient(farthest-side,transparent calc(100% - 3px),#000 0);opacity:.85}.spawnGhost.spawnB{top:50%}.rotCursor{position:fixed;z-index:1000;left:0;top:0;width:44px;height:44px;border-radius:50%;display:none;place-items:center;transform:translate(12px,12px);pointer-events:none;background:conic-gradient(var(--green) var(--cursorPct,0deg),rgba(255,255,255,.26) 0deg);box-shadow:0 8px 20px rgba(0,0,0,.35),0 0 0 2px rgba(255,255,255,.18)}.rotCursor.show{display:grid}.rotCursor:before{content:"";position:absolute;inset:5px;border-radius:50%;background:rgba(29,31,44,.96);box-shadow:inset 0 0 0 1px rgba(255,255,255,.12)}.rotCursor .spin{position:relative;z-index:1;font-size:22px;font-weight:900;line-height:1;color:#fff;text-shadow:0 2px 4px rgba(0,0,0,.5)}.rotCursor .num{position:absolute;z-index:2;right:-4px;bottom:-3px;min-width:18px;height:18px;border-radius:999px;background:#fff;color:#15151d;font-size:12px;font-weight:900;display:grid;place-items:center;padding:0 4px}.rotCursor.locked{background:conic-gradient(var(--red) var(--cursorPct,0deg),rgba(255,77,100,.22) 0deg)}.rotCursor.locked .spin{color:var(--red)}.rotCursor.noAction{background:conic-gradient(#a7abba var(--cursorPct,0deg),rgba(255,255,255,.18) 0deg);opacity:.9}.rotCursor.noAction .spin{color:#c9ccd6}
.unitLayer{position:absolute;inset:0;z-index:20;pointer-events:none}.unitToken{position:absolute;width:17px;height:17px;left:0;top:0;--hpPct:100%;--unitColor:#fff;--unitPale:rgba(255,255,255,.35);transform:translate(-50%,-50%);filter:drop-shadow(0 2px 2px rgba(0,0,0,.55));border:2px solid rgba(255,255,255,.78);background:linear-gradient(to top,var(--unitColor) var(--hpPct),var(--unitPale) var(--hpPct));transition:transform .12s ease-out, filter .12s ease-out}.unitToken.low{animation:lowHp .45s infinite alternate}@keyframes lowHp{to{filter:drop-shadow(0 2px 2px rgba(0,0,0,.55)) brightness(1.2)}}.unitToken.A{--unitColor:var(--a);--unitPale:rgba(255,107,58,.28)}.unitToken.B{--unitColor:var(--b);--unitPale:rgba(67,169,255,.28)}.unitToken.grunt{border-radius:50%}.unitToken.bruiser{border-radius:4px}.unitToken.runner{background:transparent;border:0;width:20px;height:20px}.unitToken.runner:before,.unitToken.runner:after{content:"";position:absolute;left:8px;top:0;width:5px;height:20px;border-radius:5px;background:linear-gradient(to top,var(--unitColor) var(--hpPct),var(--unitPale) var(--hpPct));box-shadow:0 0 0 1.5px rgba(255,255,255,.72)}.unitToken.runner:before{transform:rotate(45deg)}.unitToken.runner:after{transform:rotate(-45deg)}.unitToken.hit{transform:translate(-50%,-50%) scale(1.18)}.clash{position:absolute;z-index:10;left:50%;top:48%;transform:translate(-50%,-50%);font-size:20px;filter:drop-shadow(0 2px 2px rgba(0,0,0,.5));animation:clash .3s infinite alternate}@keyframes clash{to{transform:translate(-50%,-50%) scale(1.1) rotate(8deg)}}.intent{position:absolute;z-index:8;font-size:17px;text-shadow:0 2px 3px #000;transition:transform .16s,opacity .16s}.intent.A{color:var(--a);left:7px;bottom:6px}.intent.B{color:var(--b);right:7px;bottom:6px}.hpPeek{position:absolute;left:6px;top:6px;z-index:10;font-size:10px;color:#20180e;background:rgba(255,255,255,.6);border-radius:10px;padding:1px 5px;font-weight:900}
.popover,.tray{position:absolute;z-index:30;background:rgba(28,30,45,.96);border:1px solid rgba(255,255,255,.12);border-radius:18px;box-shadow:0 18px 40px rgba(0,0,0,.4);padding:10px;display:none}.popover.show,.tray.show{display:block}.spawnPop{top:62px;left:50%;transform:translateX(-50%);display:none;gap:8px}.spawnPop.show{display:flex}.choice,.upgrade{width:48px;height:48px;border-radius:14px;background:#34374d;display:grid;place-items:center;position:relative}.choice.selected{box-shadow:0 0 0 3px #fff}.choice:hover,.upgrade.affordable:hover{filter:brightness(1.2);transform:translateY(-1px)}.shapeIcon{width:18px;height:18px;background:#fff}.shapeIcon.grunt{border-radius:50%}.shapeIcon.bruiser{border-radius:4px}.shapeIcon.runner{background:transparent;position:relative}.shapeIcon.runner:before,.shapeIcon.runner:after{content:"";position:absolute;left:7px;top:-2px;width:4px;height:22px;border-radius:4px;background:#fff}.shapeIcon.runner:before{transform:rotate(45deg)}.shapeIcon.runner:after{transform:rotate(-45deg)}.tray{bottom:16px;left:50%;transform:translateX(-50%);grid-template-columns:repeat(3,64px);gap:10px}.tray.show{display:grid}.upgradePrompt{position:absolute;z-index:32;left:50%;top:-8px;transform:translate(-50%,-100%) scale(.94);display:flex;gap:8px;padding:8px;border-radius:18px;background:rgba(28,30,45,.96);border:1px solid rgba(255,255,255,.14);box-shadow:0 18px 40px rgba(0,0,0,.42);opacity:0;pointer-events:none;transition:opacity .16s cubic-bezier(.2,1,.25,1),transform .18s cubic-bezier(.2,1.35,.25,1)}.upgradePrompt.show{opacity:1;pointer-events:auto;transform:translate(-50%,-100%) scale(1)}.upgradePrompt.hidePulse{animation:upgradeTrayOut .18s cubic-bezier(.2,1,.25,1)}@keyframes upgradeTrayOut{to{opacity:0;transform:translate(-50%,-88%) scale(.92)}}.upgrade.unaffordable{opacity:.42}.upgrade.maxed{opacity:.46;box-shadow:inset 0 0 0 2px var(--green)}.upgrade.chosen{animation:upgradeChosen .22s cubic-bezier(.2,1.35,.25,1)}@keyframes upgradeChosen{50%{transform:translateY(-4px) scale(1.15);filter:brightness(1.35)}}.upgrade .lvl{position:absolute;right:-5px;bottom:-5px;background:var(--gold);color:#21160a;border-radius:999px;font-size:12px;font-weight:900;min-width:20px;height:20px;display:grid;place-items:center;box-shadow:0 2px 6px rgba(0,0,0,.35)}.upgrade .done{position:absolute;left:-4px;top:-4px;background:var(--green);color:#102017;border-radius:999px;font-size:13px;font-weight:900;width:18px;height:18px;display:grid;place-items:center}.debug{position:absolute;right:8px;top:70px;width:min(360px,42vw);max-height:70vh;overflow:auto;background:rgba(10,11,17,.87);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:10px;font-family:ui-monospace,Menlo,monospace;font-size:11px;white-space:pre-wrap;display:none;z-index:40}.debug.show{display:block}.start,.end{position:absolute;inset:0;display:grid;place-items:center;background:rgba(9,10,15,.72);z-index:50;backdrop-filter:blur(8px)}.card{width:min(460px,88vw);background:rgba(33,35,52,.97);border:1px solid rgba(255,255,255,.13);border-radius:24px;padding:24px;text-align:center;box-shadow:0 24px 70px rgba(0,0,0,.55)}.card h1{margin:0 0 8px;font-size:34px}.card p{color:#cfd2df;margin:8px 0 18px;line-height:1.4}.primary{background:linear-gradient(145deg,#ffe192,#f4a340);color:#21160a;font-weight:900;border-radius:16px;padding:13px 20px;box-shadow:0 8px 20px rgba(0,0,0,.3)}.smallBtn{background:#34374d;border-radius:12px;padding:8px 10px}.statusLine{font-size:12px;color:#cfd2df;min-width:120px;text-align:right}.pulse{animation:pulse .28s cubic-bezier(.2,1.4,.28,1)}@keyframes pulse{50%{transform:scale(1.16)}}
.netPanel{display:grid;gap:10px;margin-top:14px}.netRow{display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap}.pinBox{font-size:40px;font-weight:1000;letter-spacing:8px;background:rgba(0,0,0,.28);border-radius:18px;padding:10px 18px;color:#fff;min-height:62px}.pinInput{width:120px;text-align:center;font-size:24px;font-weight:900;letter-spacing:5px;border:0;border-radius:14px;padding:10px;background:#f8f2df;color:#171821}.netHint{font-size:12px;color:#cfd2df;min-height:18px}.roleTag{font-size:12px;color:#cfd2df;min-width:130px;text-align:left}.roleTag b{color:#fff}.primary.blue{background:linear-gradient(145deg,#8ed6ff,#329fff);color:#091522}.primary.red{background:linear-gradient(145deg,#ffa078,#ff6038);color:#221008}

@media(max-width:700px){:root{--board-size:min(96vw, calc(100vh - 112px));}.topbar{height:50px}.iconRing{width:36px;height:36px}.score{font-size:17px;min-width:58px}.debug{width:96vw;right:2vw;top:60px}.unitToken{width:14px;height:14px}.unitToken.runner{width:17px;height:17px}.unitToken.runner:before,.unitToken.runner:after{left:7px;height:17px}.tray{grid-template-columns:repeat(3,50px)}.upgradePrompt{top:2px}.upgrade{width:46px;height:46px}}

<body>
<div id="app">
  <div class="topbar">
    <div class="score"><span class="a" id="scoreA">0</span> — <span class="b" id="scoreB">0</span></div>
    <div class="icons">
      <button class="iconBtn" id="spawnBtn" title="Spawn selector"><div class="iconRing" id="spawnRing"><span id="spawnIcon">●</span><b class="bubble" id="spawnBubble">●</b></div></button>
      <div class="iconRing" id="mazeRing" title="Maze actions"><span>↻</span><b class="bubble" id="mazeBubble">0</b></div>
      <div class="iconRing" id="relicRing" title="Relics"><span>◆</span><b class="bubble" id="relicBubble">0</b></div>
      <button class="iconBtn" id="upgradeBtn" title="Upgrades"><div class="iconRing" id="upgradeRing"><span>⬢</span><b class="bubble" id="upgradeBubble">0</b></div></button>
    </div>
    <div class="roleTag" id="roleTag">Mode: <b>solo</b></div><div class="statusLine" id="statusLine">ready</div>
    <button class="smallBtn" id="pauseBtn">Ⅱ</button><button class="smallBtn" id="debugBtn">⚙</button>
  </div>
  <div class="main">
    <div class="boardWrap"><div class="board" id="board"></div><div class="unitLayer" id="unitLayer"></div><div class="upgradePrompt" id="upgradePrompt"></div></div><div class="rotCursor" id="rotCursor"><span class="spin">↻</span><b class="num" id="rotCursorNum">0</b></div>
    <div class="popover spawnPop" id="spawnPop"></div>
    <div class="tray" id="upgradeTray"></div>
    <div class="debug" id="debug"></div>
    <div class="start" id="start"><div class="card"><h1>Maze Battler</h1><p>Rotate tiles, break routes, and let your little units pile toward the center.</p><div class="netPanel"><button class="primary" id="soloBtn">Solo vs NPC</button><div class="netRow"><button class="primary red" id="hostBtn">Host</button><button class="primary blue" id="joinBtn">Join</button></div><div class="netRow"><input class="pinInput" id="pinInput" inputmode="numeric" maxlength="4" placeholder="PIN" /></div><div class="pinBox" id="pinBox" style="display:none">----</div><div class="netHint" id="netHint">Host creates a 4-number PIN. Join types it in.</div></div></div></div>
    <div class="end" id="end" style="display:none"><div class="card"><h1 id="endTitle">Game Over</h1><p id="endText"></p><button class="primary" id="restartBtn">Restart</button></div></div>
  </div>
</div>
<script>
(() => {
'use strict';
const W=5,H=5,TICK=0.25, CENTER={x:3,y:3};
const DIRS=[{k:'n',dx:0,dy:-1,arrow:'↑'},{k:'e',dx:1,dy:0,arrow:'→'},{k:'s',dx:0,dy:1,arrow:'↓'},{k:'w',dx:-1,dy:0,arrow:'←'}];
const OPP={n:'s',s:'n',e:'w',w:'e'};
const UNIT={
  grunt:{hp:6,speed:1,damage:1,interval:1,frag:1,icon:'●'},
  bruiser:{hp:10,speed:.75,damage:2,interval:1.25,frag:2,icon:'■'},
  runner:{hp:4,speed:1.5,damage:1,interval:1,frag:1,icon:'✕'}
};
const UNIT_ORDER=['grunt','runner','bruiser'];
const UNIT_UPGRADE={
  grunt:{name:'Grunt',effect:'+1 HP, +0.05 speed per level after 1',max:4},
  runner:{name:'Runner',effect:'Level 1 unlocks. +1 HP, +0.10 speed per level after 1',max:4},
  bruiser:{name:'Bruiser',effect:'Level 1 unlocks. +2 HP, +0.05 speed, +0.25 damage per level after 1',max:4}
};
const $=s=>document.querySelector(s); const boardEl=$('#board'), unitLayer=$('#unitLayer'), upgradePrompt=$('#upgradePrompt'), rotCursor=$('#rotCursor'), rotCursorNum=$('#rotCursorNum');
let state, acc=0, last=0, running=false, paused=false, debugOn=false, uid=1, rid=1;
let playMode='solo', localTeam='A', isHost=false, peer=null, conn=null, connected=false, remoteSnapshotAt=0, lastBroadcastAt=0;
function key(x,y){return x+','+y} function inb(x,y){return x>=1&&x<=W&&y>=1&&y<=H} function man(a,b=CENTER){return Math.abs(a.x-b.x)+Math.abs(a.y-b.y)}
function visualLead(){if(!state||!running||paused||state.ended)return 0; if(playMode==='join')return Math.min(.25,(performance.now()-remoteSnapshotAt)/1000); return acc;}
function visualTime(){return state?state.time+visualLead():0;}
function smoothTimer(current,interval){return Math.max(0,Math.min(interval,current+visualLead()));}
function smoothDeg(current,interval){return Math.min(360,smoothTimer(current,interval)/interval*360);}
function spawnPct(team){const p=state?.players?.[team]; return p?Math.max(0,Math.min(100,smoothTimer(p.spawnTimer,p.spawnInterval)/p.spawnInterval*100)):0;}
function me(){return state?.players?.[localTeam];}
function cursorPct(){const p=me(); return p?(p.mazeActions>=p.mazeCap?360:smoothDeg(p.mazeTimer,p.mazeInterval)):0;}
function cursorModeFor(x,y){if(!state)return 'noAction'; const p=me(); if(!p||p.mazeActions<1||state.pendingRotation)return 'noAction'; if(state.lastChanged&&state.lastChanged.x===x&&state.lastChanged.y===y)return 'locked'; return 'canAct';}
function canSimulate(){return playMode==='solo'||playMode==='host';}

function cloneBoard(board){return board.map(t=>({...t}))}

function openings(t){

function bfs(board,start,target){

function pathToTarget(unit, board=state.board){

function spawnWeights(p){const total=UNIT_ORDER.reduce((sum,cls)=>sum+(p.unitLevel[cls]||0),0)||1; return Object.fromEntries(UNIT_ORDER.map(cls=>[cls,(p.unitLevel[cls]||0)/total]));}

function newPlayer(team){return {team,score:0,scoreMeter:0,spawnTimer:0,spawnInterval:4,mazeTimer:0,mazeInterval:4,mazeActions:0,mazeCap:3,up:0,frags:0,unitLevel:{grunt:1,runner:0,bruiser:0},nextSpawn:'grunt',queuedUp:[],claimedRelics:0,npcEval:0,npcMemory:{},lastReason:'',lastScores:[]}}
function init(){

function reflectO(o){const closed=['n','e','s','w'][o]; const map={n:'s',s:'n',e:'e',w:'w'}; return ['n','e','s','w'].indexOf(map[closed]);}

function queueUpgrade(team,cls){const p=state.players[team]; if(!buyReq(p,cls))return false; p.up--; buyApply(p,cls); if(team===localTeam){const btn=upgradePrompt?.querySelector(`[data-upgrade="${cls}"]`); if(btn){btn.classList.add('chosen'); const lvl=btn.querySelector('.lvl'); if(lvl)lvl.textContent=p.unitLevel[cls]||0;} pulse('#upgradeRing'); setTimeout(()=>renderUpgrades(),170);} renderAll(); broadcastState(true); return true;}

function renderAll(){if(!state||state.boardDirty){renderBoard(); if(state)state.boardDirty=false;} renderBoardLocal(); renderUnits(); renderTop(); renderSpawn(); renderUpgrades(); if(debugOn)renderDebug();}
function renderLiveMeters(){if(!state)return; const P=me()||state.players.A; $('#spawnRing').style.setProperty('--p',`${smoothDeg(P.spawnTimer,P.spawnInterval)}deg`); $('#mazeRing').style.setProperty('--p',`${P.mazeActions>=P.mazeCap?360:smoothDeg(P.mazeTimer,P.mazeInterval)}deg`); $('#relicRing').style.setProperty('--p',`${smoothDeg(state.relicTimer,20)}deg`); $('#upgradeRing').style.setProperty('--p',`${P.up>0?360:0}deg`); $('#statusLine').textContent=`${Math.max(0,300-visualTime()).toFixed(0)}s ${paused?'paused':''}`; if(rotCursor&&rotCursor.classList.contains('show')){rotCursor.style.setProperty('--cursorPct',cursorPct()+'deg'); rotCursorNum.textContent=P.mazeActions;}}
function renderBoard(){const flowA=routeOrFallback('A'), flowB=routeOrFallback('B'); boardEl.innerHTML=''; for(let y=1;y<=5;y++)for(let x=1;x<=5;x++){const t=tileAt(state.board,x,y), o=openings(t), div=document.createElement('div'); div.className='tile'; div.dataset.x=x;div.dataset.y=y; if(x===3&&y===3)div.classList.add('center'); if(x===3&&y===1)div.classList.add('spawnA'); if(x===3&&y===5)div.classList.add('spawnB'); if(state.lastChanged&&state.lastChanged.x===x&&state.lastChanged.y===y){div.classList.add('lastChanged'); if(state.lastChanged.pending)div.classList.add('pending');} const lp=me(); if(lp&&lp.mazeActions>0&&!state.pendingRotation){if(state.lastChanged&&state.lastChanged.x===x&&state.lastChanged.y===y)div.classList.add('locked'); else div.classList.add('canAct');} else div.classList.add('noAction'); const fk=key(x,y), inA=flowA.path.has(fk), inB=flowB.path.has(fk); const pulseCls=state.routePulseUntil>state.time?' routePulse':''; if(inA&&inB) div.innerHTML+='<div class="flowBoth'+pulseCls+'"></div>'; else if(inA)div.innerHTML+='<div class="flowA'+pulseCls+'"></div>'; else if(inB)div.innerHTML+='<div class="flowB'+pulseCls+'"></div>'; div.innerHTML+='<div class="core"></div>'+DIRS.filter(d=>o[d.k]).map(d=>`<div class="arm ${d.k}"></div>`).join('')+'<div class="lockMark"></div>'; if(x===3&&y===1){div.innerHTML+='<div class="spawnMark"></div>'; const cls=state.players.A.nextSpawn; div.innerHTML+=`<div class="spawnGhost spawnA ${cls}" data-spawn-ghost="A" style="--spawnPct:${spawnPct('A')}%;--spawnDeg:${spawnPct('A')*3.6}deg"></div>`;} if(x===3&&y===5){div.innerHTML+='<div class="spawnMark"></div>'; const cls=state.players.B.nextSpawn; div.innerHTML+=`<div class="spawnGhost spawnB ${cls}" data-spawn-ghost="B" style="--spawnPct:${spawnPct('B')}%;--spawnDeg:${spawnPct('B')*3.6}deg"></div>`;} if(flowA.fallback===fk||flowB.fallback===fk)div.innerHTML+='<div class="fallbackDot"></div>'; const rel=state.relics.find(r=>r.x===x&&r.y===y); if(rel)div.innerHTML+='<div class="relic"></div>'; const us=state.units.filter(u=>u.x===x&&u.y===y); if(us.some(u=>u.team==='A')&&us.some(u=>u.team==='B'))div.innerHTML+='<div class="clash">✷</div>'; const intents=intentsFor(x,y); if(intents.A)div.innerHTML+=`<div class="intent A">${intents.A}</div>`; if(intents.B)div.innerHTML+=`<div class="intent B">${intents.B}</div>`; if(us.length>9)div.innerHTML+=`<div class="hpPeek">${us.length}</div>`; boardEl.appendChild(div);}}
function renderBoardLocal(){if(!state)return; document.querySelectorAll('[data-spawn-ghost]').forEach(el=>{const team=el.dataset.spawnGhost, p=state.players[team], cls=p.nextSpawn; el.className=`spawnGhost spawn${team} ${cls}`; const pct=spawnPct(team); el.style.setProperty('--spawnPct',pct+'%'); el.style.setProperty('--spawnDeg',(pct*3.6)+'deg');});}
function visualUnitPosition(u){let x=u.x,y=u.y,dist=u.progress; const blocked=state.units.some(v=>!v.dead&&v.team!==u.team&&v.x===u.x&&v.y===u.y); if(!blocked&&u.dir&&u.path.length&&running&&!paused&&!state.ended){dist+=statsFor(u.team,u.cls).speed*visualLead(); let idx=0; while(dist>=1&&idx<u.path.length){x=u.path[idx].x; y=u.path[idx].y; dist-=1; idx++;} const next=u.path[idx]; if(next){const d=DIRS.find(dd=>x+dd.dx===next.x&&y+dd.dy===next.y); if(d){x+=d.dx*Math.max(0,Math.min(.98,dist)); y+=d.dy*Math.max(0,Math.min(.98,dist));}}} else if(u.dir&&u.path.length&&!blocked){x+=u.dir.dx*Math.max(0,Math.min(.98,dist)); y+=u.dir.dy*Math.max(0,Math.min(.98,dist));} return {x,y};}
function renderUnits(){if(!state||!unitLayer)return; const boardRect=boardEl.getBoundingClientRect(); const pad=6, gap=6, cell=(boardRect.width-pad*2-gap*4)/5; const live=new Set(); const groups=new Map(); for(const u of state.units.filter(u=>!u.dead)){const baseKey=key(u.x,u.y); if(!groups.has(baseKey))groups.set(baseKey,[]); groups.get(baseKey).push(u);} const idxById=new Map(); for(const arr of groups.values())arr.forEach((u,i)=>idxById.set(u.id,{i,n:arr.length})); for(const u of state.units.filter(u=>!u.dead)){live.add(String(u.id)); const pos=visualUnitPosition(u); let x=pos.x,y=pos.y; const g=idxById.get(u.id)||{i:0,n:1}; const off=[ [0,0],[-.16,.12],[.16,.12],[0,-.13],[-.18,-.08],[.18,-.08],[-.08,.22],[.08,.22],[0,.22] ][g.i%9]||[0,0]; const left=pad+(x-1)* (cell+gap)+cell/2+off[0]*cell; const top=pad+(y-1)*(cell+gap)+cell/2+off[1]*cell; const hp=Math.max(0,Math.min(100,(u.hp/u.maxHp)*100)); let el=unitLayer.querySelector(`[data-id="${u.id}"]`); if(!el){el=document.createElement('div'); el.dataset.id=u.id; unitLayer.appendChild(el);} el.className=`unitToken ${u.team} ${u.cls} ${hp<=30?'low':''}`; el.style.left=left+'px'; el.style.top=top+'px'; el.style.setProperty('--hpPct',hp+'%'); el.title=`${u.cls} ${Math.ceil(Math.max(0,u.hp))}/${u.maxHp}`;} [...unitLayer.children].forEach(el=>{if(!live.has(el.dataset.id))el.remove();}); }
function routeOrFallback(team){const sp=spawnPoint(team), p=bfs(state.board,sp,CENTER); const set=new Set(); let fb=null; if(p){set.add(key(sp.x,sp.y)); p.forEach(n=>set.add(key(n.x,n.y)));} else {const f=fallback(state.board,sp); fb=key(f.x,f.y); const pp=bfs(state.board,sp,f)||[]; set.add(key(sp.x,sp.y)); pp.forEach(n=>set.add(key(n.x,n.y)));} return {path:set,fallback:fb};}
function intentsFor(x,y){const res={}; for(const team of ['A','B']){const us=state.units.filter(u=>u.team===team&&u.x===x&&u.y===y); if(!us.length)continue; if(state.units.some(v=>v.team!==team&&v.x===x&&v.y===y))continue; const counts={}; for(const u of us){if(!u.dir)recalc(u); if(u.dir)counts[u.dir.arrow]=(counts[u.dir.arrow]||0)+1;} const best=Object.entries(counts).sort((a,b)=>b[1]-a[1])[0]; if(best)res[team]=best[0];} return res;}
function renderTop(){const A=state.players.A,B=state.players.B,P=me()||A; $('#scoreA').textContent=A.score; $('#scoreB').textContent=B.score; $('#mazeBubble').textContent=P.mazeActions; $('#upgradeBubble').textContent=P.up; $('#relicBubble').textContent=state.relics.length; $('#spawnBubble').textContent=UNIT[P.nextSpawn].icon; $('#spawnIcon').textContent='◌'; $('#spawnRing').title='Next spawn: '+UNIT[P.nextSpawn].icon+'  '+spawnOddsText(P); $('#roleTag').innerHTML='Mode: <b>'+ (playMode==='solo'?'solo':(playMode==='host'?'host red':'join blue')) +'</b>'; renderLiveMeters();}
function renderSpawn(){const pop=$('#spawnPop'); if(pop)pop.innerHTML='';}
function positionUpgradePrompt(){
  if(!upgradePrompt||!state)return;
  const boardRect=boardEl.getBoundingClientRect();
  const wrapRect=boardEl.parentElement.getBoundingClientRect();
  const pad=6,gap=6,cell=(boardRect.width-pad*2-gap*4)/5;
  const sp=spawnPoint(localTeam);
  const left=pad+(sp.x-1)*(cell+gap)+cell/2;
  const top=pad+(sp.y-1)*(cell+gap)-8;
  upgradePrompt.style.left=left+'px';
  upgradePrompt.style.top=top+'px';
}
function renderUpgrades(){
  if(!upgradePrompt||!state)return;
  positionUpgradePrompt();
  const P=me();
  if(!P){upgradePrompt.classList.remove('show'); return;}
  const hasChoice=P.up>0 && UNIT_ORDER.some(cls=>buyReq(P,cls));
  const sig=localTeam+'|'+hasChoice+'|'+P.up+'|'+UNIT_ORDER.map(cls=>P.unitLevel[cls]||0).join(',');
  if(upgradePrompt.dataset.sig===sig)return;
  upgradePrompt.dataset.sig=sig;
  if(!hasChoice){upgradePrompt.classList.remove('show'); upgradePrompt.innerHTML=''; return;}
  upgradePrompt.innerHTML='';
  for(const cls of UNIT_ORDER){
    const cfg=UNIT_UPGRADE[cls], lvl=P.unitLevel[cls]||0, req=buyReq(P,cls);
    const b=document.createElement('button');
    b.dataset.upgrade=cls;
    b.className='upgrade '+(req?'affordable':'unaffordable')+(lvl>=cfg.max?' maxed':'');
    b.title=`${cfg.name}\nLevel ${lvl}/${cfg.max}\n${cfg.effect}\nSpawn weight: ${lvl}`;
    b.innerHTML=`<div class="shapeIcon ${cls}"></div><b class="lvl">${lvl}</b>${lvl>=cfg.max?'<b class="done">✓</b>':''}`;
    b.onclick=(e)=>{e.stopPropagation(); requestUpgrade(cls);};
    upgradePrompt.appendChild(b);
  }
  upgradePrompt.classList.add('show');
}
function renderDebug(){const A=state.players.A,B=state.players.B; $('#debug').textContent=`time ${state.time.toFixed(1)} paused ${paused}
A score/action/up/frags ${A.score}/${A.mazeActions}/${A.up}/${A.frags}
B score/action/up/frags ${B.score}/${B.mazeActions}/${B.up}/${B.frags}
last changed ${state.lastChanged?state.lastChanged.x+','+state.lastChanged.y:'none'}
units A/B ${state.units.filter(u=>u.team==='A').length}/${state.units.filter(u=>u.team==='B').length}
relics ${state.relics.map(r=>key(r.x,r.y)).join(' ')}
A approach ${JSON.stringify(approach(state.board,spawnPoint('A')))}
B approach ${JSON.stringify(approach(state.board,spawnPoint('B')))}
A levels ${JSON.stringify(A.unitLevel)} next ${A.nextSpawn} odds ${spawnOddsText(A)}
B levels ${JSON.stringify(B.unitLevel)} next ${B.nextSpawn} odds ${spawnOddsText(B)}
NPC ${B.lastReason}
NPC memory ${JSON.stringify(B.npcMemory)}
${(B.lastScores||[]).map(s=>`cand ${s.x},${s.y} score ${s.score?.toFixed(1)} ${s.parts?.join(' ')}`).join('\n')}`;}
function pulse(sel){const el=$(sel); if(!el)return; el.classList.remove('pulse'); void el.offsetWidth; el.classList.add('pulse');}
function status(txt){$('#statusLine').textContent=txt;}
function loop(ts){if(!last)last=ts; let dt=Math.min(.1,(ts-last)/1000); last=ts; if(canSimulate()){acc+=dt; while(acc>=TICK){tick(TICK);acc-=TICK;}} renderBoardLocal(); renderUnits(); renderLiveMeters(); if(debugOn)renderDebug(); requestAnimationFrame(loop);}
function netHint(txt){const el=$('#netHint'); if(el)el.textContent=txt; status(txt);}
function makePin(){return String(Math.floor(1000+Math.random()*9000));}
function peerId(pin){return 'maze-battler-'+pin;}
function closePeer(){try{conn&&conn.close();}catch(e){} try{peer&&peer.destroy();}catch(e){} conn=null; peer=null; connected=false;}
function startSolo(){closePeer(); playMode='solo'; localTeam='A'; isHost=false; init(); $('#start').style.display='none'; running=true; paused=false; renderAll();}
function startHost(){
  if(typeof Peer==='undefined'){netHint('PeerJS did not load. Internet is needed for PIN multiplayer.'); return;}
  closePeer(); playMode='host'; localTeam='A'; isHost=true; running=false; paused=false; init();
  const pin=makePin(); $('#pinBox').style.display='block'; $('#pinBox').textContent=pin; netHint('Waiting for blue player...');
  peer=new Peer(peerId(pin),{debug:1});
  peer.on('open',()=>netHint('PIN '+pin+' ready. Waiting for blue player...'));
  peer.on('connection',c=>{ if(conn){c.close(); return;} conn=c; wireConnection(c); });
  peer.on('error',err=>{netHint('Host error: '+(err.type||err.message||err)); if((err.type||'')==='unavailable-id')startHost();});
}
function startJoin(){
  if(typeof Peer==='undefined'){netHint('PeerJS did not load. Internet is needed for PIN multiplayer.'); return;}
  const pin=($('#pinInput').value||'').replace(/\D/g,'').slice(0,4); if(pin.length!==4){netHint('Enter the 4-number host PIN.'); return;}
  closePeer(); playMode='join'; localTeam='B'; isHost=false; running=false; paused=false; $('#pinBox').style.display='none'; netHint('Joining '+pin+'...');
  peer=new Peer(undefined,{debug:1});
  peer.on('open',()=>{conn=peer.connect(peerId(pin),{reliable:true,serialization:'json'}); wireConnection(conn);});
  peer.on('error',err=>netHint('Join error: '+(err.type||err.message||err)));
}
function wireConnection(c){
  c.on('open',()=>{connected=true; if(playMode==='host'){running=true; paused=false; $('#start').style.display='none'; netHint('Blue connected. You are red.'); broadcastState(true);} else {$('#start').style.display='none'; netHint('Connected. You are blue.'); sendToPeer({type:'hello'});} renderAll();});
  c.on('data',msg=>handleNetMessage(msg));
  c.on('close',()=>{connected=false; netHint('Connection closed.');});
  c.on('error',err=>netHint('Connection error: '+(err.message||err)));
}
function handleNetMessage(msg){
  if(!msg||typeof msg!=='object')return;
  if(playMode==='host'){
    if(msg.type==='input'&&msg.team==='B'){
      if(msg.action==='rotate')queueRotate('B',msg.x,msg.y);
      if(msg.action==='upgrade')queueUpgrade('B',msg.cls);
      broadcastState(true);
    }
    if(msg.type==='restart'){init(); running=true; paused=false; $('#end').style.display='none'; broadcastState(true);}
  } else if(playMode==='join'){
    if(msg.type==='state')applyRemoteState(msg);
  }
}
function requestRotate(x,y){
  if(!state)return false;
  if(playMode==='join'){sendToPeer({type:'input',action:'rotate',team:'B',x,y}); return true;}
  return queueRotate(localTeam,x,y);
}
function requestUpgrade(cls){
  if(!state)return false;
  if(playMode==='join'){sendToPeer({type:'input',action:'upgrade',team:'B',cls}); return true;}
  return queueUpgrade(localTeam,cls);
}
$('#soloBtn').onclick=startSolo;
$('#hostBtn').onclick=startHost;
$('#joinBtn').onclick=startJoin;
$('#pinInput').addEventListener('keydown',e=>{if(e.key==='Enter')startJoin();});
$('#restartBtn').onclick=()=>{if(playMode==='join'){sendToPeer({type:'restart'});return;} init();$('#end').style.display='none';running=true;paused=false;broadcastState(true);};
$('#pauseBtn').onclick=()=>{if(playMode==='join'){status('host controls pause');return;} paused=!paused;renderAll();broadcastState(true);};
$('#debugBtn').onclick=()=>{debugOn=!debugOn;$('#debug').classList.toggle('show',debugOn);renderAll();};
$('#spawnBtn').onclick=()=>{const p=me()||state.players.A; status('spawn odds '+spawnOddsText(p));$('#upgradeTray').classList.remove('show');};
$('#upgradeBtn').onclick=()=>{const p=me()||state.players.A; status(p.up>0?'choose a unit upgrade above your spawn':'no upgrade ready');};
boardEl.addEventListener('pointerdown',e=>{const tile=e.target.closest('.tile'); if(!tile||!boardEl.contains(tile))return; e.preventDefault(); requestRotate(Number(tile.dataset.x),Number(tile.dataset.y));});
boardEl.addEventListener('pointermove',e=>{const tile=e.target.closest('.tile'); if(!tile||!boardEl.contains(tile)||!rotCursor)return hideRotCursor(); const x=Number(tile.dataset.x), y=Number(tile.dataset.y), mode=cursorModeFor(x,y); boardEl.classList.add('cursoring'); rotCursor.className='rotCursor show '+(mode==='locked'?'locked':mode==='noAction'?'noAction':''); rotCursor.style.left=e.clientX+'px'; rotCursor.style.top=e.clientY+'px'; rotCursor.style.setProperty('--cursorPct',cursorPct()+'deg'); rotCursorNum.textContent=me()?.mazeActions??0;});
function hideRotCursor(){boardEl.classList.remove('cursoring'); if(rotCursor)rotCursor.classList.remove('show','locked','noAction');}
boardEl.addEventListener('pointerleave',hideRotCursor);
boardEl.addEventListener('pointercancel',hideRotCursor);

init(); requestAnimationFrame(loop);
})();
</script>
</body>
